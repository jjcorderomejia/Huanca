# minio StatefulSet — captured into git at P11-4 (Longhorn migration; was raw-kubectl-applied,
# uncommitted). storageClassName set to longhorn-r2 (critical tier) + topologySpread added at
# recreate-time per SCALING_PATH P11-4 (§3 P10-13 consensus). serviceName/Service unchanged.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: bigdata
  labels:
    app: minio
spec:
  replicas: 1
  serviceName: minio
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      # P11-4 (§3 P10-13): spread the stateful tier when it scales; no-op at replicas=1,
      # ScheduleAnyway so it never blocks a single-replica placement.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: minio
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-05-01T01-11-10Z
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: minio-secret, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: minio-secret, key: MINIO_ROOT_PASSWORD } }
            - name: MINIO_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: minio-secret, key: MINIO_ROOT_USER } }
            - name: MINIO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: minio-secret, key: MINIO_ROOT_PASSWORD } }
          ports:
            - { containerPort: 9000, name: api }
            - { containerPort: 9001, name: console }
          volumeMounts:
            - { name: data, mountPath: /data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn-r2
        resources:
          requests:
            # 50Gi matches live PVC (expanded online 5->50Gi 2026-06-17 incident); template is
            # documentation-intent — live PVC already 50Gi; a fresh recreate would mint 50Gi.
            storage: 50Gi
