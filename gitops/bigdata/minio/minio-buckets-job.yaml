apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  namespace: bigdata
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-06-12T14-34-03Z
          env:
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_PASS
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              mc alias set local http://minio:9000 "${MINIO_USER}" "${MINIO_PASS}"
              mc mb local/iceberg --ignore-existing
              mc mb local/checkpoints --ignore-existing
              # Pre-create the spark-events prefix inside checkpoints. Spark
              # eventLog (enabled in spark-fraud-stream.yaml.tpl sparkConf) does
              # NOT auto-create its directory — driver crashes on startup with
              # "java.io.FileNotFoundException: No such file or directory:
              # s3a://checkpoints/spark-events" if missing. The .keep object is
              # a sentinel so the prefix survives empty.
              mc mb local/checkpoints/spark-events --ignore-existing
              echo "" > /tmp/.keep && mc cp /tmp/.keep local/checkpoints/spark-events/.keep
              # 21-day retention on event logs — raised from the 7d default during the
              # 2026-06-17 PVC-expansion / Spark-History-Server fix incident to keep ~3wk of
              # Spark History (safe while usage << 50Gi; revisit if spark-events/ nears ~20GiB).
              # Idempotent — listing-only output if rule already present (rule id will differ).
              mc ilm rule add --expire-days 21 --prefix "spark-events/" local/checkpoints || true
              # Checkpoint versioning intentionally NOT enabled. Spark checkpoint churn +
              # versioning-without-noncurrent-expiration produced ~11G / ~2.4M noncurrent+
              # delete-marker objects (live checkpoint ~54MB) — see ops/S6. Recovery is
              # Kafka/Redpanda offset replay (startingOffsets=earliest), not version restore.
              mc ls local
