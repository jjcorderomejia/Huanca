executor: KubernetesExecutor

webserverSecretKeySecretName: airflow-webserver-secret

# fsGroupChangePolicy: Always — without it, kubelet's default OnRootMismatch
# skips re-applying fsGroup when the PVC root gid already matches (it does, =0),
# leaving /opt/airflow/logs at 755 root:root — non-writable by the uid-50000
# worker, so new DAGs fail to create their log dir (PermissionError on
# /opt/airflow/logs/dag_id=<new dag>). "Always" forces the recursive
# group-write fix on every mount. Applies to all Airflow pods including
# KubernetesExecutor task pods, which are the ones that create the log dirs.
securityContexts:
  pod:
    runAsUser: 50000
    runAsGroup: 0
    fsGroup: 0
    fsGroupChangePolicy: "Always"

env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "false"

extraEnv: |
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: minio-secret
        key: MINIO_ROOT_USER
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: minio-secret
        key: MINIO_ROOT_PASSWORD
  - name: STARROCKS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: starrocks-credentials
        key: root-password

serviceAccount:
  name: airflow
  create: false

createUserJob:
  enabled: false   # admin created manually via Secret below — never default admin/admin

scheduler:
  serviceAccount:
    name: airflow
  extraVolumes:
    - name: spark-manifests
      configMap:
        name: compact-iceberg-spark-app
        optional: true
  extraVolumeMounts:
    - name: spark-manifests
      mountPath: /opt/spark-manifests
      readOnly: true

dagProcessor:
  serviceAccount:
    name: airflow
  extraVolumes:
    - name: spark-manifests
      configMap:
        name: compact-iceberg-spark-app
        optional: true
  extraVolumeMounts:
    - name: spark-manifests
      mountPath: /opt/spark-manifests
      readOnly: true

webserver:
  serviceAccount:
    name: airflow
  defaultUser:
    enabled: false   # disable default admin/admin — we create admin via Secret below

triggerer:
  serviceAccount:
    name: airflow

dags:
  gitSync:
    enabled: true
    repo: https://github.com/jjcorderomejia/Huanca.git
    branch: main
    ref: main
    subPath: dags
    credentialsSecret: airflow-git-token-secret
    period: 60s
    depth: 1

logs:
  persistence:
    enabled: true
    existingClaim: airflow-logs  # pre-created with ReadWriteOnce — local-path constraint

postgresql:
  enabled: true
  primary:
    persistence:
      storageClass: local-path
      size: 10Gi
