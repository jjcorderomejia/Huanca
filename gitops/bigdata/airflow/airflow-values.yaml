executor: KubernetesExecutor

webserverSecretKeySecretName: airflow-webserver-secret

# Pod securityContext hygiene. NOTE: fsGroup / fsGroupChangePolicy are INERT on
# this cluster — the airflow-logs PVC is local-path (hostPath-backed), and the
# hostPath volume plugin does not implement fsGroup. Kept for correctness if the
# volume class ever changes. The actual fix for the logs-dir permission problem
# is the scheduler extraInitContainers chmod below (see scheduler:).
securityContexts:
  pod:
    runAsUser: 50000
    runAsGroup: 0
    fsGroup: 0
    fsGroupChangePolicy: "Always"

env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "false"

extraEnv: |
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: minio-secret
        key: MINIO_ROOT_USER
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: minio-secret
        key: MINIO_ROOT_PASSWORD
  - name: STARROCKS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: starrocks-credentials
        key: root-password

serviceAccount:
  name: airflow
  create: false

createUserJob:
  enabled: false   # admin created manually via Secret below — never default admin/admin

scheduler:
  serviceAccount:
    name: airflow
  # fix-logs-perms: the airflow-logs PVC is local-path (hostPath) and its root
  # is created root:root 755 — non-writable by the uid-50000 worker, so new
  # DAGs fail with PermissionError creating /opt/airflow/logs/dag_id=<dag>.
  # hostPath volumes don't honor fsGroup, so this root init container is the
  # declarative fix: chmod 2775 (group-writable + setgid) the parent dir on
  # every scheduler start. Once the parent is group-writable the uid-50000
  # task pods create their own dag_id=… subdirs fine.
  extraInitContainers:
    - name: fix-logs-perms
      image: busybox:1.36
      securityContext:
        runAsUser: 0
      command: ["sh", "-c", "chmod 2775 /opt/airflow/logs"]
      volumeMounts:
        - name: logs
          mountPath: /opt/airflow/logs
  extraVolumes:
    - name: spark-manifests
      configMap:
        name: compact-iceberg-spark-app
        optional: true
  extraVolumeMounts:
    - name: spark-manifests
      mountPath: /opt/spark-manifests
      readOnly: true

dagProcessor:
  serviceAccount:
    name: airflow
  extraVolumes:
    - name: spark-manifests
      configMap:
        name: compact-iceberg-spark-app
        optional: true
  extraVolumeMounts:
    - name: spark-manifests
      mountPath: /opt/spark-manifests
      readOnly: true

webserver:
  serviceAccount:
    name: airflow
  defaultUser:
    enabled: false   # disable default admin/admin — we create admin via Secret below

triggerer:
  serviceAccount:
    name: airflow

dags:
  gitSync:
    enabled: true
    repo: https://github.com/jjcorderomejia/Huanca.git
    branch: main
    ref: main
    subPath: dags
    credentialsSecret: airflow-git-token-secret
    period: 60s
    depth: 1

logs:
  persistence:
    enabled: true
    existingClaim: airflow-logs  # pre-created with ReadWriteOnce — local-path constraint

postgresql:
  enabled: true
  primary:
    persistence:
      storageClass: local-path
      size: 10Gi
