executor: KubernetesExecutor

webserverSecretKeySecretName: airflow-webserver-secret

# Pod securityContext hygiene. NOTE: fsGroup / fsGroupChangePolicy are INERT on
# this cluster — the airflow-logs PVC is local-path (hostPath-backed), and the
# hostPath volume plugin does not implement fsGroup. Kept for correctness if the
# volume class ever changes. The actual fix for the logs-dir permission problem
# is the scheduler extraInitContainers chmod below (see scheduler:).
securityContexts:
  pod:
    runAsUser: 50000
    runAsGroup: 0
    fsGroup: 0
    fsGroupChangePolicy: "Always"

env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "false"

# Remote task logging to MinIO (S3-compatible). §3-2026-06-07: airflow-logs is
# NOT migrated to Longhorn — the RWO local-path PVC pins every component + every
# KubernetesExecutor task pod to node1 (Multi-Attach on cross-node spread). Switch
# Airflow to remote logging to the existing `airflow` bucket in MinIO and drop the
# PVC. KE ships task logs to S3 on COMPLETION; the running-task live-log path
# (api-server/webserver -> task-pod worker_log_server_port 8793) is cross-node-native.
# Amazon provider (apache-airflow-providers-amazon) ships in apache/airflow:3.1.7.
config:
  logging:
    remote_logging: 'True'
    remote_base_log_folder: 's3://airflow/logs'
    remote_log_conn_id: 'minio_s3'
    # path-style addressing + the in-cluster MinIO endpoint for the S3 hook
    encrypt_s3_logs: 'False'

extraEnv: |
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: minio-secret
        key: MINIO_ROOT_USER
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: minio-secret
        key: MINIO_ROOT_PASSWORD
  - name: STARROCKS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: starrocks-credentials
        key: root-password
  # minio_s3 Airflow connection for remote_log_conn_id. Built from the
  # secret-backed MINIO_ACCESS_KEY/SECRET_KEY above via k8s $(VAR) interpolation
  # (those two env entries precede this one, so they are in scope) — no creds in
  # git. aws://<login>:<password>@ + endpoint_url forces the S3 hook at the
  # in-cluster MinIO; path-style addressing is required for MinIO.
  - name: AIRFLOW_CONN_MINIO_S3
    value: "aws://$(MINIO_ACCESS_KEY):$(MINIO_SECRET_KEY)@?endpoint_url=http%3A%2F%2Fminio%3A9000"

serviceAccount:
  name: airflow
  create: false

createUserJob:
  enabled: false   # admin created manually via Secret below — never default admin/admin

scheduler:
  serviceAccount:
    name: airflow
  # fix-logs-perms: the airflow-logs PVC is local-path (hostPath) and its root
  # is created root:root 755 — non-writable by the uid-50000 worker, so new
  # DAGs fail with PermissionError creating /opt/airflow/logs/dag_id=<dag>.
  # hostPath volumes don't honor fsGroup, so this root init container is the
  # declarative fix: chmod 2775 (group-writable + setgid) the parent dir on
  # every scheduler start. Once the parent is group-writable the uid-50000
  # task pods create their own dag_id=… subdirs fine.
  extraInitContainers:
    - name: fix-logs-perms
      image: busybox:1.36
      securityContext:
        runAsUser: 0
      command: ["sh", "-c", "chmod 2775 /opt/airflow/logs"]
      volumeMounts:
        - name: logs
          mountPath: /opt/airflow/logs
  extraVolumes:
    - name: spark-manifests
      configMap:
        name: compact-iceberg-spark-app
        optional: true
  extraVolumeMounts:
    - name: spark-manifests
      mountPath: /opt/spark-manifests
      readOnly: true

dagProcessor:
  serviceAccount:
    name: airflow
  extraVolumes:
    - name: spark-manifests
      configMap:
        name: compact-iceberg-spark-app
        optional: true
  extraVolumeMounts:
    - name: spark-manifests
      mountPath: /opt/spark-manifests
      readOnly: true

webserver:
  serviceAccount:
    name: airflow
  defaultUser:
    enabled: false   # disable default admin/admin — we create admin via Secret below

triggerer:
  serviceAccount:
    name: airflow

dags:
  gitSync:
    enabled: true
    repo: https://github.com/jjcorderomejia/Huanca.git
    branch: main
    ref: main
    subPath: dags
    credentialsSecret: airflow-git-token-secret
    period: 60s
    depth: 1

logs:
  # §3-2026-06-07: remote logging to MinIO (config.logging above) replaces the RWO
  # airflow-logs PVC. persistence:false drops the existingClaim mount from every
  # component + every KubernetesExecutor task pod — unpinning Airflow from node1 so
  # task pods schedule cross-node (hetz2/hetz3). PVC + Retain'd PV kept as fallback
  # until the cross-node live-log-stream GUARD certifies green.
  persistence:
    enabled: false

postgresql:
  enabled: true
  primary:
    persistence:
      storageClass: longhorn-r2
      size: 10Gi
    # P11-4.5 (§3 P10-13): spread the postgres primary off the node1 pile on
    # recreate. ScheduleAnyway / single primary → brief downtime tolerated, no
    # stuck-Pending; governs future even placement. Realized by helm upgrade
    # (manual release) or the controlled cordon+delete rollout.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: postgresql
            app.kubernetes.io/instance: airflow
            app.kubernetes.io/component: primary
