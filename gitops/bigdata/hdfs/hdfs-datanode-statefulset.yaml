apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations: {}
  name: hdfs-datanode
  namespace: bigdata
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: hdfs-datanode
  serviceName: hdfs-datanode
  template:
    metadata:
      labels:
        app: hdfs-datanode
    spec:
      containers:
        - image: ghcr.io/jjcorderomejia/hadoop-datanode:3.4.1
          imagePullPolicy: IfNotPresent
          name: datanode
          ports:
            - containerPort: 9864
              name: http
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data/hdfs/datanode
              name: dn-data
            - mountPath: /opt/hadoop/etc/hadoop
              name: hadoop-conf
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: ghcr-creds
      initContainers:
        - command:
            - sh
            - -c
            - chown -R 1000:1000 /data/hdfs/datanode || true
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          name: fix-dn-perms
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data/hdfs/datanode
              name: dn-data
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: hadoop-config
          name: hadoop-conf
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: hdfs-datanode
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: dn-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        volumeMode: Filesystem
        storageClassName: longhorn-r2
