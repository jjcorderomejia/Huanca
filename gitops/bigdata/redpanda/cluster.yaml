apiVersion: cluster.redpanda.com/v1alpha2
kind: Redpanda
metadata:
  name: fraud-redpanda
  namespace: bigdata
spec:
  chartRef: {}
  clusterSpec:
    statefulset:
      replicas: 1
    storage:
      persistentVolume:
        enabled: true
        size: 20Gi
        storageClass: local-path
    resources:
      requests:
        cpu: "250m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
    config:
      cluster:
        auto_create_topics_enabled: false
    listeners:
      kafka:
        port: 9092
