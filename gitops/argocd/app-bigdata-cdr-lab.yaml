apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bigdata-cdr-lab
  namespace: argocd
spec:
  project: default
  source:
    # Pass 6 H7 fix: align with `bigdata-fraud-lab` (SSH) and the single
    # `huanca-repo` repository Secret (SSH key). The prior HTTPS URL had
    # NO matching repository Secret — worked only because Huanca is
    # public-read today; would have broken the moment Huanca privacy
    # flipped. Asymmetric URL scheme across the two bigdata Applications
    # for the same underlying repo was a latent bomb.
    repoURL: git@github.com:jjcorderomejia/Huanca.git
    targetRevision: main
    path: gitops/bigdata
  destination:
    server: https://kubernetes.default.svc
    namespace: bigdata
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Pre-staged for the ArgoCD v2→v3 controller upgrade (B3 Stage B).
      # v3 flips the controller diff engine default from client-side to
      # server-side apply (controller.diff.server.side: "true" in
      # cluster-config/manifests/argocd/values.yaml). Declaring
      # ServerSideApply on the Application makes the transition
      # deliberate at the sync-option layer rather than a silent flip on
      # the first v3 reconcile. ServerSideApply is the K8s >=1.30
      # recommendation and the mode this Application will run under
      # post-B3 regardless. Cites:
      #   - https://argo-cd.readthedocs.io/en/stable/operator-manual/upgrading/3.0/
      #   - https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/#server-side-apply
      - ServerSideApply=true
